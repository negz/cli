name: Promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.18.0)'
        required: true
      channel:
        description: 'Release channel'
        required: true
        default: 'stable'
      pre-release:
        type: boolean
        description: 'This is a pre-release (will not update current pointer)'
        required: true
        default: false

permissions:
  contents: read

env:
  AWS_USR: ${{ secrets.AWS_USR }}

jobs:
  promote:
    permissions:
      contents: read
      packages: write  # for pushing to ghcr.io
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31

      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: crossplane
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Promote Artifacts to S3
        if: env.AWS_USR != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_USR }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_PSW }}
          AWS_DEFAULT_REGION: us-east-1
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          PRE_RELEASE: ${{ inputs.pre-release }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$PRE_RELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          nix run .#promote-artifacts -- "${GITHUB_REF##*/}" "$VERSION" "$CHANNEL" $PRERELEASE_FLAG
